name: Feature Request with subtasks
description: Feature request that will get default subtasks
title: "[FEATURE] "
labels: ["enhancement", "with-subtasks"]
type: feature
body:
  - type: textarea
    id: details
    attributes:
      label: Feature Request
      description: Provide all details for this feature request.
      value: |
        ## 🎯 Context
        Explain the need or problem that this feature would solve.

        ## 💡 Proposed Solution
        Describe the desired feature or suggested implementation.

        ## 🧩 Alternatives Considered
        List any alternative approaches or solutions you've thought of.

        ## ✅ Acceptance Criteria
        - [ ] Works as described
        - [ ] Compatible with other modules
        - [ ] Tested and documented

        ## 🧰 Additional Information
        Links, mockups, or references.
      render: markdown
